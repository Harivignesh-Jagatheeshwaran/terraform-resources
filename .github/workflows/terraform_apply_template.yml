# .github/workflows/terraform_apply_template.yml

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: terraform init
        run: terraform -chdir=${{ matrix.folder }} init -reconfigure

      - name: terraform validate
        run: terraform -chdir=${{ matrix.folder }} validate

      # check is_destroy flag from tfvars
      - name: check destroy flag
        id: check-destroy
        run: |
          TFVARS="${{ matrix.folder }}/terraform.tfvars"

          if grep -q 'is_destroy\s*=\s*true' "$TFVARS"; then
            echo "mode=destroy" >> $GITHUB_OUTPUT
            echo "IS_DESTROY=true detected in $TFVARS — running destroy"
          else
            echo "mode=apply"   >> $GITHUB_OUTPUT
            echo "IS_DESTROY not set or false — running apply"
          fi

      # ── APPLY MODE ──────────────────────────────────────────
      - name: terraform plan
        id: plan
        if: steps.check-destroy.outputs.mode == 'apply'
        run: |
          terraform -chdir=${{ matrix.folder }} plan \
            -out=tfplan.binary \
            -no-color 2>&1 | tee plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        env:
          TF_VAR_role_arn:    ${{ secrets.AWS_IAM_ROLE_ARN }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region:  ${{ matrix.region }}

      - name: terraform apply
        id: apply
        if: steps.check-destroy.outputs.mode == 'apply'
        run: |
          terraform -chdir=${{ matrix.folder }} apply \
            -no-color \
            tfplan.binary 2>&1 | tee apply_output.txt

          APPLY=$(cat apply_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$APPLY"       >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── DESTROY MODE ─────────────────────────────────────────
      - name: terraform plan destroy
        id: plan-destroy
        if: steps.check-destroy.outputs.mode == 'destroy'
        run: |
          terraform -chdir=${{ matrix.folder }} plan \
            -destroy \
            -out=tfplan.binary \
            -no-color 2>&1 | tee plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        env:
          TF_VAR_role_arn:    ${{ secrets.AWS_IAM_ROLE_ARN }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region:  ${{ matrix.region }}

      - name: terraform destroy
        id: destroy
        if: steps.check-destroy.outputs.mode == 'destroy'
        run: |
          terraform -chdir=${{ matrix.folder }} apply \
            -no-color \
            tfplan.binary 2>&1 | tee apply_output.txt

          APPLY=$(cat apply_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$APPLY"       >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── POST COMMENT (both modes) ────────────────────────────
      - name: post result comment
        uses: actions/github-script@v6
        with:
          script: |
            const folder      = "${{ matrix.folder }}";
            const environment = "${{ inputs.environment }}";
            const region      = "${{ matrix.region }}";
            const mode        = "${{ steps.check-destroy.outputs.mode }}";

            const isDestroy   = mode === "destroy";
            const planOut     = isDestroy
              ? `${{ steps.plan-destroy.outputs.output }}`
              : `${{ steps.plan.outputs.output }}`;
            const applyOut    = isDestroy
              ? `${{ steps.destroy.outputs.output }}`
              : `${{ steps.apply.outputs.output }}`;

            const applyOutcome  = "${{ steps.apply.outcome }}";
            const destroyOutcome = "${{ steps.destroy.outcome }}";
            const outcome       = isDestroy ? destroyOutcome : applyOutcome;
            const status        = outcome === "success" ? "✅" : "❌";
            const action        = isDestroy ? "Destroy" : "Apply";

            const body = `
            ### ${status} Terraform ${action} — \`${folder}\`

            | | |
            |---|---|
            | **Environment** | \`${environment}\` |
            | **Region**      | \`${region}\` |
            | **Folder**      | \`${folder}\` |
            | **Mode**        | \`${action}\` |

            <details>
            <summary>Plan output</summary>

            \`\`\`hcl
            ${planOut}
            \`\`\`

            </details>

            <details>
            <summary>${action} output</summary>

            \`\`\`hcl
            ${applyOut}
            \`\`\`

            </details>
            `;

            await github.rest.repos.createCommitComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              commit_sha: context.sha,
              body:       body
            });

      - name: check result status
        if: |
          steps.apply.outcome == 'failure' ||
          steps.destroy.outcome == 'failure'
        run: exit 1