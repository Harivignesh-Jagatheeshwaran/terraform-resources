on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  terragrunt-apply:
    name: "Apply [${{ inputs.environment }}] ${{ matrix.folder }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false    # ← required for terragrunt

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        run: |
          terragrunt init \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive \
            -reconfigure

      - name: Terragrunt Validate
        run: |
          terragrunt validate \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive

      - name: Generate Unique Plan Filename
        id: plan-file
        run: |
          SAFE_NAME=$(echo "${{ matrix.folder }}" | tr '/' '-')
          PLAN_FILE="${SAFE_NAME}.tfplan"
          echo "plan_file=$PLAN_FILE" >> $GITHUB_OUTPUT
          echo "Plan file: $PLAN_FILE"

      - name: Terragrunt Plan
        id: plan
        run: |
          terragrunt plan \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive \
            -out=${{ steps.plan-file.outputs.plan_file }} \
            -no-color 2>&1 | tee plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

      - name: Terragrunt Apply
        id: apply
        run: |
          terragrunt apply \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive \
            --terragrunt-log-level debug \
            -no-color \
            ${{ steps.plan-file.outputs.plan_file }} 2>&1 | tee apply_output.txt

          APPLY=$(cat apply_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$APPLY"       >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
