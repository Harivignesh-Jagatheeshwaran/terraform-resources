# .github/workflows/terraform_apply_template.yml

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: "Apply [${{ inputs.environment }}] ${{ matrix.folder }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: terraform -chdir=${{ matrix.folder }} init -reconfigure

      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.folder }} validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ matrix.folder }} plan \
            -out=tfplan.binary \
            -no-color 2>&1 | tee plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        env:
          TF_VAR_role_arn:    ${{ secrets.AWS_IAM_ROLE_ARN }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region:  ${{ matrix.region }}

      - name: Terraform Apply
        id: apply
        run: |
          terraform -chdir=${{ matrix.folder }} apply \
            -no-color \
            tfplan.binary 2>&1 | tee apply_output.txt

          APPLY=$(cat apply_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$APPLY"       >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Validate Apply Succeeded
        if: steps.apply.outcome == 'failure'
        run: exit 1