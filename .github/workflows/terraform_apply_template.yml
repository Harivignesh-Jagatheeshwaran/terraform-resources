on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  terragrunt-apply:
    name: "Apply [${{ inputs.environment }}] ${{ matrix.folder }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Clear Terragrunt Cache
        working-directory: ${{ matrix.folder }}
        run: |
          rm -rf .terragrunt-cache
          find . -name "*.tfplan" -delete 2>/dev/null || true
          find . -name "tfplan" -delete 2>/dev/null || true

      - name: Terragrunt Init
        working-directory: ${{ matrix.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: terragrunt init -reconfigure

      - name: Terragrunt Validate
        working-directory: ${{ matrix.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: terragrunt validate

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ matrix.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: |
          set +e
          terragrunt plan -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Locate the cache directory where tfplan was written
          CACHE_DIR=$(find .terragrunt-cache -name "tfplan" ! -path "*/.terraform/*" | head -1 | xargs -I{} dirname {})
          echo "cache_dir=$CACHE_DIR" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          exit 0

      - name: Terraform Apply (saved plan)
        working-directory: ${{ matrix.folder }}
        run: |
          # Apply the saved plan directly via terraform to avoid Terragrunt
          # re-injecting TF_VAR_* variables, which Terraform 1.10 rejects
          # when a saved plan already contains baked-in variable values.
          cd "${{ steps.plan.outputs.cache_dir }}"
          terraform apply -auto-approve -no-color tfplan 2>&1 | tee apply_output.txt

          APPLY=$(cat apply_output.txt)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$APPLY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT