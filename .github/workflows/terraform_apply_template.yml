on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  terragrunt-apply:
    name: "Apply [${{ inputs.environment }}] ${{ matrix.folder }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        env:
          TG_NON_INTERACTIVE: "true"
          TG_LOG_LEVEL: debug
          TG_NO_COLOR: "true"
          TG_WORKING_DIR: ${{ matrix.folder }}
        run: |
          terragrunt init -reconfigure

      - name: Terragrunt Validate
        env:
          TG_NON_INTERACTIVE: "true"
          TG_LOG_LEVEL: debug
          TG_NO_COLOR: "true"
          TG_WORKING_DIR: ${{ matrix.folder }}
        run: |
          terragrunt validate

      - name: Terragrunt Plan
        id: plan
        env:
          TG_NON_INTERACTIVE: "true"
          TG_LOG_LEVEL: debug
          TG_NO_COLOR: "true"
          TG_WORKING_DIR: ${{ matrix.folder }}
        run: |
          terragrunt plan 2>&1 | tee plan_output.txt

          EXIT_CODE=${PIPESTATUS[0]}

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # exit 1 = error, exit 2 = changes present (not an error)
          if [ $EXIT_CODE -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Terragrunt Apply
        env:
          TG_NON_INTERACTIVE: "true"
          TG_LOG_LEVEL: debug
          TG_NO_COLOR: "true"
          TG_WORKING_DIR: ${{ matrix.folder }}
        run: |
          terragrunt apply -auto-approve 2>&1 | tee apply_output.txt

          APPLY=$(cat apply_output.txt)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$APPLY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT