on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terragrunt-plan:
    name: "Plan [${{ inputs.environment }}] ${{ matrix.folder }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false    # ← required for terragrunt

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        run: |
          terragrunt init \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive \
            -reconfigure

      - name: Terragrunt Validate
        run: |
          terragrunt validate \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive

      - name: Terragrunt Plan
        id: plan
        run: |
          terragrunt plan \
            --terragrunt-working-dir=${{ matrix.folder }} \
            --terragrunt-non-interactive \
            -no-color 2>&1 | tee plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Publish Plan Results to Pull Request
        uses: actions/github-script@v6
        with:
          script: |
            const folder      = "${{ matrix.folder }}";
            const environment = "${{ inputs.environment }}";
            const region      = "${{ matrix.region }}";
            const plan        = `${{ steps.plan.outputs.output }}`;
            const status      = "${{ steps.plan.outcome }}" === "success" ? "✅" : "❌";

            const body = `
            ### ${status} Terragrunt Plan — \`${folder}\`

            | | |
            |---|---|
            | **Environment** | \`${environment}\` |
            | **Region**      | \`${region}\` |
            | **Folder**      | \`${folder}\` |

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`

            </details>
            `;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
            });

            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes(`Terragrunt Plan — \`${folder}\``)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                body:       body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                body:         body
              });
            }

      - name: Validate Plan Succeeded
        if: steps.plan.outcome == 'failure'
        run: exit 1