# .github/workflows/terraform_plan_template.yml

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ matrix.region }}
          role-duration-seconds: 3600

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: terraform init
        run: terraform -chdir=${{ matrix.folder }} init -reconfigure

      - name: terraform plan
        id: plan
        run: |
          terraform -chdir=${{ matrix.folder }} plan \
            -no-color 2>&1 | tee plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        env:
          TF_VAR_role_arn:    ${{ secrets.AWS_IAM_ROLE_ARN }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region:  ${{ matrix.region }}
        continue-on-error: true

      - name: post plan comment
        uses: actions/github-script@v6
        with:
          script: |
            const folder      = "${{ matrix.folder }}";
            const environment = "${{ inputs.environment }}";
            const region      = "${{ matrix.region }}";
            const plan        = `${{ steps.plan.outputs.output }}`;
            const status      = "${{ steps.plan.outcome }}" === "success" ? "✅" : "❌";

            const body = `
            ### ${status} Terraform Plan — \`${folder}\`

            | | |
            |---|---|
            | **Environment** | \`${environment}\` |
            | **Region**      | \`${region}\` |
            | **Folder**      | \`${folder}\` |

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`

            </details>
            `;

            // update existing comment if already posted for this folder
            // avoids stacking multiple comments on same PR for repeated pushes
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
            });

            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes(`Terraform Plan — \`${folder}\``)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                body:       body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                body:         body
              });
            }

      - name: check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1