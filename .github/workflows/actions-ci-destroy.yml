name: Terraform Destroy
run-name: "Terraform Destroy — ${{ inputs.environment }}/${{ inputs.region }}/${{ inputs.module }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - dev
          - stg
          - prod

      region:
        description: 'Target AWS Region'
        required: true
        type: choice
        options:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1

      module:
        description: |
          Module path inside accounts/{env}/{region}/
          Examples:
            vpc
            eks/001-ecommerce-website
            airflow
            ec2
        required: true
        type: string

      confirm:
        description: 'Type DESTROY to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  validate-destroy-request:
    name: Validate Destroy Request
    runs-on: ubuntu-latest
    outputs:
      folder: ${{ steps.resolve-target.outputs.folder }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Verify Destroy Confirmation
        run: |
          if [[ "${{ inputs.confirm }}" != "DESTROY" ]]; then
            echo "❌ ERROR: Confirmation failed"
            echo "Expected: DESTROY"
            echo "Received: ${{ inputs.confirm }}"
            exit 1
          fi
          echo "✅ Destroy confirmation accepted"

      - name: Resolve and Validate Target Module
        id: resolve-target
        run: |
          FOLDER="accounts/${{ inputs.environment }}/${{ inputs.region }}/${{ inputs.module }}"

          echo "Target module: $FOLDER"

          if [[ ! -d "$FOLDER" ]]; then
            echo ""
            echo "❌ ERROR: Target module does not exist: $FOLDER"
            echo ""
            echo "Available modules under accounts/${{ inputs.environment }}/${{ inputs.region }}:"
            find "accounts/${{ inputs.environment }}/${{ inputs.region }}" \
              -name "terragrunt.hcl" \
              | xargs -I {} dirname {} \
              | sed "s|accounts/${{ inputs.environment }}/${{ inputs.region }}/||" \
              | sort \
              2>/dev/null || echo "  (none found or region does not exist)"
            exit 1
          fi

          if [[ ! -f "$FOLDER/terragrunt.hcl" ]]; then
            echo "❌ ERROR: $FOLDER is not a valid Terragrunt module (terragrunt.hcl not found)"
            exit 1
          fi

          echo "✅ Target module validated: $FOLDER"
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT

  generate-destroy-plan:
    name: Generate Destroy Plan
    runs-on: ubuntu-latest
    needs: validate-destroy-request
    environment: ${{ inputs.environment }}
    outputs:
      folder: ${{ needs.validate-destroy-request.outputs.folder }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ inputs.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: terragrunt init -reconfigure

      - name: Terragrunt Validate
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: terragrunt validate

      - name: Terragrunt Plan Destroy
        id: plan
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: |
          set +e
          terragrunt plan -destroy -no-color 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "=================================================="
          echo "RESOURCES SCHEDULED FOR DESTRUCTION:"
          echo "=================================================="
          cat plan_output.txt

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          exit 0
        continue-on-error: true

      - name: Publish Destroy Plan for Review
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const folder     = "${{ needs.validate-destroy-request.outputs.folder }}";
            const planOut    = `${{ steps.plan.outputs.output }}`;
            const planStatus = "${{ steps.plan.outcome }}";
            const status     = planStatus === "success" ? "✅" : "❌";

            const summary = `
            ## ${status} Destroy Plan — \`${folder}\`

            > ⚠️ **REVIEW CAREFULLY — These resources will be permanently deleted.**
            > A second approval is required before destruction proceeds.

            | | |
            |---|---|
            | **Environment**  | \`${{ inputs.environment }}\` |
            | **Region**       | \`${{ inputs.region }}\` |
            | **Module**       | \`${{ inputs.module }}\` |
            | **Triggered by** | \`${{ github.actor }}\` |
            | **Plan status**  | ${status} \`${planStatus}\` |

            <details>
            <summary>📋 Full Destroy Plan Output</summary>

            \`\`\`hcl
            ${planOut}
            \`\`\`

            </details>
            `;

            await core.summary
              .addRaw(summary)
              .write();

      - name: Abort if Destroy Plan Failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "❌ Destroy plan failed — aborting pipeline"
          exit 1

  await-destroy-approval:
    name: Awaiting Destroy Approval
    runs-on: ubuntu-latest
    needs: [validate-destroy-request, generate-destroy-plan]
    environment: destroy-approval

    steps:
      - name: Destroy Approval Received
        run: |
          echo "✅ Destroy approved by reviewer"
          echo "=================================================="
          echo "Proceeding to destroy: ${{ needs.validate-destroy-request.outputs.folder }}"
          echo "Approved by:           ${{ github.actor }}"
          echo "=================================================="

  execute-terraform-destroy:
    name: Execute Terraform Destroy
    runs-on: ubuntu-latest
    needs: [validate-destroy-request, await-destroy-approval]
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region:            ${{ inputs.region }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: terragrunt init -reconfigure

      - name: Terragrunt Validate
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: terragrunt validate

      - name: Terragrunt Plan Destroy
        id: plan
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: |
          set +e
          terragrunt plan -destroy -out=tfplan -no-color 2>&1 | tee plan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          PLAN=$(cat plan_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$PLAN"        >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          exit 0

      - name: Terragrunt Destroy (saved plan)
        id: destroy
        working-directory: ${{ needs.validate-destroy-request.outputs.folder }}
        env:
          TG_NON_INTERACTIVE: "true"
          TG_NO_COLOR: "true"
        run: |
          # Unset TF_VAR_* so Terraform 1.10 does not reject variable overrides
          # when applying a saved plan that already has values baked in.
          unset $(env | grep '^TF_VAR_' | cut -d= -f1) 2>/dev/null || true
          terragrunt apply -auto-approve -no-color tfplan 2>&1 | tee destroy_output.txt

          DESTROY=$(cat destroy_output.txt)
          echo "output<<EOF"  >> $GITHUB_OUTPUT
          echo "$DESTROY"     >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Publish Destroy Results
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const folder     = "${{ needs.validate-destroy-request.outputs.folder }}";
            const planOut    = `${{ steps.plan.outputs.output }}`;
            const destroyOut = `${{ steps.destroy.outputs.output }}`;
            const destStatus = "${{ steps.destroy.outcome }}";
            const status     = destStatus === "success"
              ? "✅ Infrastructure Successfully Destroyed"
              : "❌ Destroy Execution Failed";

            const summary = `
            ## ${status}

            ### 💣 Terraform Destroy — \`${folder}\`

            | | |
            |---|---|
            | **Environment**    | \`${{ inputs.environment }}\` |
            | **Region**         | \`${{ inputs.region }}\` |
            | **Module**         | \`${{ inputs.module }}\` |
            | **Triggered by**   | \`${{ github.actor }}\` |
            | **Destroy status** | ${destStatus === "success" ? "✅" : "❌"} \`${destStatus}\` |

            <details>
            <summary>📋 Plan Output</summary>

            \`\`\`hcl
            ${planOut}
            \`\`\`

            </details>

            <details>
            <summary>💣 Destroy Output</summary>

            \`\`\`hcl
            ${destroyOut}
            \`\`\`

            </details>
            `;

            await core.summary
              .addRaw(summary)
              .write();

      - name: Validate Destroy Succeeded
        if: steps.destroy.outcome == 'failure'
        run: |
          echo "❌ Terraform destroy failed"
          exit 1