name: Terraform Plan
run-name: "Terraform Plan — PR${{ github.event.pull_request.number }} by @${{ github.actor }}"

on:
  pull_request:
    branches: [main]
    paths:
      - 'accounts/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-infrastructure-changes:
    name: Detect Infrastructure Changes
    runs-on: ubuntu-latest
    outputs:
      matrix_dev:  ${{ steps.build-matrix.outputs.matrix_dev }}
      matrix_stg:  ${{ steps.build-matrix.outputs.matrix_stg }}
      matrix_prod: ${{ steps.build-matrix.outputs.matrix_prod }}
      has_dev:     ${{ steps.build-matrix.outputs.has_dev }}
      has_stg:     ${{ steps.build-matrix.outputs.has_stg }}
      has_prod:    ${{ steps.build-matrix.outputs.has_prod }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Identify Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: accounts/**

      - name: Build Environment Change Matrix
        id: build-matrix
        run: |
          FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          ALL=$(echo "$FILES" \
            | tr ' ' '\n' \
            | xargs -I {} dirname {} \
            | grep -oP '^accounts/[^/]+/[^/]+/[^/]+(/[^/]+)?' \
            | sort -u)

          echo "Unique changed module paths:"
          echo "$ALL"

          build_matrix() {
            local env=$1
            local result

            result=$(echo "$ALL" \
              | grep "^accounts/$env/" \
              | while read -r folder; do
                  region=$(echo "$folder" | cut -d'/' -f3)
                  echo "{\"environment\":\"$env\",\"region\":\"$region\",\"folder\":\"$folder\"}"
                done \
              | jq -sc '.')

            echo "${result:-[]}"
          }

          DEV_MATRIX=$(build_matrix dev)
          STG_MATRIX=$(build_matrix stg)
          PROD_MATRIX=$(build_matrix prod)

          echo "matrix_dev=$DEV_MATRIX"   >> $GITHUB_OUTPUT
          echo "matrix_stg=$STG_MATRIX"   >> $GITHUB_OUTPUT
          echo "matrix_prod=$PROD_MATRIX" >> $GITHUB_OUTPUT

          echo "Dev matrix:  $DEV_MATRIX"
          echo "Stg matrix:  $STG_MATRIX"
          echo "Prod matrix: $PROD_MATRIX"

          echo "has_dev=$([[ "$DEV_MATRIX"  != "[]" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_stg=$([[ "$STG_MATRIX"  != "[]" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_prod=$([[ "$PROD_MATRIX" != "[]" ]] && echo true || echo false)" >> $GITHUB_OUTPUT

  terraform-plan-development:
    name: Terraform Plan — Development
    needs: detect-infrastructure-changes
    if: needs.detect-infrastructure-changes.outputs.has_dev == 'true'
    uses: ./.github/workflows/terraform_plan_template.yml
    with:
      environment: dev
      matrix:      ${{ needs.detect-infrastructure-changes.outputs.matrix_dev }}
    secrets: inherit

  terraform-plan-staging:
    name: Terraform Plan — Staging
    needs: detect-infrastructure-changes
    if: needs.detect-infrastructure-changes.outputs.has_stg == 'true'
    uses: ./.github/workflows/terraform_plan_template.yml
    with:
      environment: stg
      matrix:      ${{ needs.detect-infrastructure-changes.outputs.matrix_stg }}
    secrets: inherit

  terraform-plan-production:
    name: Terraform Plan — Production
    needs: detect-infrastructure-changes
    if: needs.detect-infrastructure-changes.outputs.has_prod == 'true'
    uses: ./.github/workflows/terraform_plan_template.yml
    with:
      environment: prod
      matrix:      ${{ needs.detect-infrastructure-changes.outputs.matrix_prod }}
    secrets: inherit

  terraform-plan-gate:
    name: Terraform Plan Quality Gate
    runs-on: ubuntu-latest
    needs: [terraform-plan-development, terraform-plan-staging, terraform-plan-production]
    if: always()
    steps:
      - name: Evaluate Plan Results
        run: |
          DEV="${{ needs.terraform-plan-development.result }}"
          STG="${{ needs.terraform-plan-staging.result }}"
          PROD="${{ needs.terraform-plan-production.result }}"

          echo "================================================"
          echo "TERRAFORM PLAN QUALITY GATE"
          echo "================================================"
          echo "Development : $DEV"
          echo "Staging     : $STG"
          echo "Production  : $PROD"
          echo "================================================"

          for result in "$DEV" "$STG" "$PROD"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ Quality gate failed — one or more plan jobs failed"
              exit 1
            fi
          done

          echo "✅ Quality gate passed — all plans succeeded or were skipped"