# .github/workflows/plan.yml

name: Terraform Plan
run-name: Terraform Plan — PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'accounts/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix_dev:  ${{ steps.build-matrix.outputs.matrix_dev }}
      matrix_stg:  ${{ steps.build-matrix.outputs.matrix_stg }}
      matrix_prod: ${{ steps.build-matrix.outputs.matrix_prod }}
      has_dev:     ${{ steps.build-matrix.outputs.has_dev }}
      has_stg:     ${{ steps.build-matrix.outputs.has_stg }}
      has_prod:    ${{ steps.build-matrix.outputs.has_prod }}

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: accounts/**

      - name: build matrix per environment
        id: build-matrix
        run: |
          FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          # extract unique accounts/{env}/{region} paths from changed files
          ALL=$(echo "$FILES" \
            | tr ' ' '\n' \
            | grep -oP '^accounts/[^/]+/[^/]+' \
            | sort -u)

          echo "Unique changed paths: $ALL"

          # build per-env matrices
          build_matrix() {
            local env=$1
            echo "$ALL" \
              | grep "^accounts/$env/" \
              | while IFS='/' read -r _ e region; do
                  echo "{\"environment\":\"$e\",\"region\":\"$region\",\"folder\":\"accounts/$e/$region\"}"
                done \
              | jq -sc '.'
          }

          DEV_MATRIX=$(build_matrix dev)
          STG_MATRIX=$(build_matrix stg)
          PROD_MATRIX=$(build_matrix prod)

          echo "matrix_dev=$DEV_MATRIX"   >> $GITHUB_OUTPUT
          echo "matrix_stg=$STG_MATRIX"   >> $GITHUB_OUTPUT
          echo "matrix_prod=$PROD_MATRIX" >> $GITHUB_OUTPUT

          # has_* flags — true only if matrix is non-empty
          echo "has_dev=$([[ "$DEV_MATRIX" != "[]" ]]   && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_stg=$([[ "$STG_MATRIX" != "[]" ]]   && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_prod=$([[ "$PROD_MATRIX" != "[]" ]]  && echo true || echo false)" >> $GITHUB_OUTPUT

  plan-dev:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_dev == 'true'
    uses: ./.github/workflows/terraform_plan_template.yml
    with:
      environment: dev
      matrix:      ${{ needs.detect-changes.outputs.matrix_dev }}
    secrets: inherit

  plan-stg:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_stg == 'true'
    uses: ./.github/workflows/terraform_plan_template.yml
    with:
      environment: stg
      matrix:      ${{ needs.detect-changes.outputs.matrix_stg }}
    secrets: inherit

  plan-prod:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_prod == 'true'
    uses: ./.github/workflows/terraform_plan_template.yml
    with:
      environment: prod
      matrix:      ${{ needs.detect-changes.outputs.matrix_prod }}
    secrets: inherit